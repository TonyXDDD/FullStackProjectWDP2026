<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeEats - Posts</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <span id="safe">Safe</span><span id="eats">Eats♡</span>
        </div>
        <div class="nav-right">
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
            <a href="post.html">Posts</a>
        </div>
    </nav>
    <div class="form-container">
        <h1>Create a Post</h1>
        <form id="post">
            <label for="restaurantName">Restaurant Name</label>
            <input type="text" id="restaurantName" name="restaurantName" required>
            
            <label for="location">Location</label>
            <input type="text" id="location" name="location" required>

            <label for="rating">Rating (1-5)</label>
            <input type="number" id="rating" name="rating" min="1" max="5" required>

            <label for="postText">Write your review</label>
            <textarea id="postText" name="postText" rows="6" required></textarea>

            <button type="submit">Post</button>
        </form>
    </div>
<script src ="./scripts/post.js"></script>
</body>
</html>
